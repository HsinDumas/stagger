name: Spring Java Format Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Execute Spring Java Format Validation
        id: format-validation
        run: |
          echo "Executing Spring code format validation"
          ./gradlew --no-daemon \
            :stagger-core:checkFormatMain \
            :stagger-maven-plugin:checkFormatMain \
            :stagger-gradle-plugin:checkFormatMain