name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: |
        ./gradlew --no-daemon \
          :stagger-core:build \
          :stagger-maven-plugin:build \
          :stagger-gradle-plugin:build

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Check code style with Gradle
      run: |
        ./gradlew --no-daemon \
          :stagger-core:checkFormatMain \
          :stagger-core:checkstyleMain \
          :stagger-maven-plugin:checkFormatMain \
          :stagger-maven-plugin:checkstyleMain \
          :stagger-gradle-plugin:checkFormatMain \
          :stagger-gradle-plugin:checkstyleMain

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true
